#     cap_add:
#       - NET_ADMIN
#       # - SYS_MODULE  # rarely needed, see main config above
#     environment:
#       - PUID=1000
#       - PGID=1000
#       - TZ=Etc/UTC
#       - SERVERURL=vpn.example.com
